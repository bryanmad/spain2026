        <script>
            //=================================================================================
            // this runs on startup or reload
            //
            //=================================================================================
            // prevent default img menu of options
            document.addEventListener("contextmenu", (event) => {
                event.preventDefault();
            });

            // declare global variables
            var childtxt;
            var data;
            var getDataRetryCount = 0;
            // set up courses with details for calculations etc.
            // array ["hole num",par,si]
            // day 1 - calanova
            // day 2 - la cala america
            // day 3 - mijas los lagos
            // day 4 - la cala europa
            // day 5 - la cala asia
            // hole, par, si
            arrCourse = [
                [0, 0, 0],
                [1, 5, 9],
                [2, 4, 5],
                [3, 4, 1],
                [4, 4, 11],
                [5, 4, 1],
                [6, 3, 7],
                [7, 4, 15],
                [8, 3, 17],
                [9, 5, 3],
                [10, 5, 6],
                [11, 4, 4],
                [12, 4, 18],
                [13, 3, 12],
                [14, 5, 2],
                [15, 4, 8],
                [16, 4, 10],
                [17, 3, 16],
                [18, 4, 14]
            ];

            //===========================
            // this code runs at startup
            //===========================
            getData();
            //=============================================================
            // functions - run when called
            //=============================================================

            //=============================================================
            // async function getData()
            // - gets results data
            //=============================================================
            async function getData() {
                var url = "https://opensheet.elk.sh/1wmKWaoRF7aXMGToFcXQoKtK8XNyBdvcFXCgDcaqZnvM/resultsFinal";

                try {
                    console.log("timeout delay = " + (getDataRetryCount * 1000 + 2000));
                    const dataStream = await fetch(url, {
                        signal: AbortSignal.timeout(getDataRetryCount * 1000 + 2000)
                    });
                    if (!dataStream.ok) {
                        throw new Error(`Response status: ${dataStream.status}`);
                    } else {
                        data = await dataStream.json();

                        // say if hcps are updated
                        // show message
                        //console.log(data[0].updated + " ---------");

                        //if (data[0].updated == "Monday") {
                        //    console.log(data[0].updated + " therefore OK");
                        //} else {
                        //    document.getElementById("panel").innerText =
                        //        "Handicaps and tee groups for Monday have not been updated, they will be updated Monday morning.";
                        //    document.getElementById("panel").style.display = "flex";
                        //}

                        $("#pagetwo").fadeIn(500);

                        //console.log(data);
                        // data is sorted with highest score first so test that to see if it >0
                        //console.log("data[0].playerpoints = " + data.length);
                        //if (data[0].players.length > 0) {
                        // change < to >
                        //console.log("using useDataResults()");
                        document.getElementById("panel").style.display = "none";
                        useDataResults();
                        //} else {
                        //    useDataHcp();
                        //}
                    }
                    //
                    //
                } catch (err) {
                    console.error(err.message);
                    if (err.name === "TimeoutError") {
                        // This exception is from the abort signal
                        console.error("Timeout: no results within 10 seconds");
                    } else if (err.name === "AbortError") {
                        // This exception is from the fetch itself
                        console.error("Fetch aborted by user action (browser stop button, closing tab, etc.");
                    } else if (err.name === "TypeError") {
                        console.error("AbortSignal.timeout() method is not supported");
                    } else {
                        // A network error, or some other problem.
                        console.error(`Error: type: ${err.name}, message: ${err.message}`);
                    }
                    // retry
                    getDataRetryCount++;
                    if (getDataRetryCount < 5) {
                        getData();
                    }
                }
            }

            //=============================================================
            // functions - run when called
            //=============================================================

            function useDataResults() {
                let container = document.getElementById("createleaderboarditems");
                // empty container
                container.innerHTML = "";
                //console.log(data);
                data.forEach((el, i) => {
                    let box = document.createElement("div");
                    box.id = "box" + i;
                    box.className = "team";
                    box.setAttribute("onclick", "showStats(this.id);return false;");

                    let name = document.createElement("span");
                    name.id = "name" + i;
                    name.className = "name";
                    name.innerHTML = el.players;

                    let scores = document.createElement("span");
                    scores.id = "scores" + i;
                    scores.className = "scores";

                    let position = document.createElement("span");
                    position.id = "position" + i;
                    position.className = "position";
                    position.innerHTML = i;

                    let birdgif = document.createElement("span");
                    birdgif.id = "birdgif" + i;
                    birdgif.className = "birdgif";

                    let birdgifnumber = document.createElement("span");
                    birdgifnumber.id = "birdgifnumber" + i;
                    birdgifnumber.className = "birdgifnumber";

                    let birdimg = document.createElement("img");
                    birdimg.id = "birdimg" + i;
                    birdimg.className = "birdimg";
                    birdimg.src = "bird.gif";

                    let birdcount = document.createElement("img");
                    birdcount.id = "birdcount" + i;
                    birdcount.className = "birdimg";
                    //birdcount.src = "bird.gif";

                    birdgif.appendChild(birdimg);
                    birdgifnumber.appendChild(birdcount);

                    box.appendChild(position);
                    box.appendChild(name);

                    box.appendChild(birdgif);
                    box.appendChild(birdgifnumber);

                    box.appendChild(scores);

                    container.appendChild(box);
                    // fade the initial view
                    container.style.opacity = 0.3;
                });

                var k = 0;

                // do proper display

                document.getElementById("createleaderboarditems").style.opacity = 1;

                data.forEach((el, i) => {
                    k++;
                    setTimeout(function () {
                        //if (el.players !== "") {
                        bodyUpdate(el.players, el.playerpoints, i);
                        //}
                    }, k * 300);
                });
            }

            function bodyUpdate(nom, points, i) {
                let pos = i + 1;
                //temp

                data.find((team) => team.players === nom);
                // now sort out positions for same scores
                let AllTeams = Array.from(document.querySelectorAll(".team"));
                let element = AllTeams[i];
                let elementPos = element.querySelector(".position");
                let elementScore = element.querySelector(".scores");
                let elementName = element.querySelector(".name");
                // cope with first position
                if (i < 1) {
                    let previousElement = AllTeams[i];
                    let previousElementPos = previousElement.querySelector(".position");
                    let previousElementScore = previousElement.querySelector(".scores");
                    elementPos.innerHTML = pos;
                } else {
                    let previousElement = AllTeams[i - 1];
                    let previousElementPos = previousElement.querySelector(".position");
                    let previousElementScore = previousElement.querySelector(".scores");
                    // if this score is the same as previous - same position
                    if (previousElementScore.innerHTML == points) {
                        elementPos.innerHTML = previousElementPos.innerHTML;
                    } else {
                        elementPos.innerHTML = pos;
                    }
                }
                // end of cope with first position
                //

                // sort out the birdies
                let elementBirdGif = element.querySelector(".birdgif");
                let elementBirdGifNumber = element.querySelector(".birdgifnumber");
                if (elementName.innerHTML == nom) {
                    elementScore.innerHTML = points;
                }
                var birdnum = data.find((team) => team.players === elementName.innerHTML).bird;
                if (birdnum > 0) {
                    document.getElementById("birdgif" + i).style.visibility = "visible";
                    document.getElementById("birdgifnumber" + i).className = "numbird";
                    document.getElementById("birdgifnumber" + i).innerText = birdnum;
                    document.getElementById("birdgifnumber" + i).style.visibility = "visible";
                }

                // fade in results
                elementPos.style.opacity = 0;
                elementName.style.opacity = 0;
                elementScore.style.opacity = 0;
                elementBirdGif.style.opacity = 0;
                elementBirdGifNumber.style.opacity = 0;

                elementPos.style.transition = "opacity 3s";
                elementName.style.transition = "opacity 3s";
                elementScore.style.transition = "opacity 3s";
                elementBirdGif.style.transition = "opacity 3s";
                elementBirdGifNumber.style.transition = "opacity 3s";

                elementPos.style.opacity = 1;
                elementName.style.opacity = 1;
                elementScore.style.opacity = 1;
                elementBirdGif.style.opacity = 1;
                elementBirdGifNumber.style.opacity = 1;

                element.classList.add("animate");
            }

            function drawGraph(arrMyPoints) {
                var PlayerGraph;
                const xValues = [
                    "eagles " + arrMyPoints[0],
                    "birdies " + arrMyPoints[1],
                    "pars " + arrMyPoints[2],
                    "bogeys " + arrMyPoints[3],
                    "worse " + arrMyPoints[4]
                ];
                //const yValues = [55, 49, 44, 24, 15];

                var yValues = arrMyPoints;
                var barColors = ["cyan"];

                var ctx = document.getElementById("myChart");
                try {
                    var PlayerGraph = Chart.getChart("myChart");
                    PlayerGraph.destroy();
                    //console.log("trying to destory then redraw chart");
                } catch (e) {
                    //console.log("chart does not exist yet to destroy");
                }

                Chart.defaults.font.size = 16;
                Chart.defaults.color = "white";

                var PlayerGraph = new Chart(ctx, {
                    type: "bar",
                    data: {
                        labels: xValues,
                        datasets: [
                            {
                                backgroundColor: barColors,
                                data: yValues
                            }
                        ]
                    },
                    options: {
                        plugins: {
                            legend: { display: false },
                            title: {
                                display: true,
                                text: childtxt + " - How you played ",
                                font: { size: 20, color: "white" }
                            }
                        }
                    }
                });
            }
