        <script>
            //=================================================================================
            // this runs on startup or reload
            //
            //=================================================================================
            // prevent default img menu of options
            document.addEventListener("contextmenu", (event) => {
                event.preventDefault();
            });

            // declare global variables
            var childtxt;
            var data;
            var getDataRetryCount = 0;
            // Define the sleep function
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            //===========================
            // this code runs at startup
            //===========================
            getData();
            //=============================================================
            // functions - run when called
            //=============================================================

            //=============================================================
            // async function getData()
            // - gets results data
            //=============================================================
            async function getData() {
                var url = "https://opensheet.elk.sh/1wmKWaoRF7aXMGToFcXQoKtK8XNyBdvcFXCgDcaqZnvM/resultsFinal";
                try {
                    console.log("timeout delay = " + (getDataRetryCount * 1000 + 2000));
                    const dataStream = await fetch(url, {
                        signal: AbortSignal.timeout(getDataRetryCount * 1000 + 2000)
                    });
                    if (!dataStream.ok) {
                        throw new Error(`Response status: ${dataStream.status}`);
                    } else {
                        data = await dataStream.json();
                        $("#pagetwo").fadeIn(500);
                        document.getElementById("panel").style.display = "none";
                        useDataResults();
                    }
                } catch (err) {
                    console.error(err.message);
                    if (err.name === "TimeoutError") {
                        // This exception is from the abort signal
                        console.error("Timeout: server too busy");
                    } else if (err.name === "AbortError") {
                        // This exception is from the fetch itself
                        console.error("Fetch aborted by user action (browser stop button, closing tab, etc.");
                    } else if (err.name === "TypeError") {
                        console.error("AbortSignal.timeout() method is not supported");
                    } else {
                        // A network error, or some other problem.
                        console.error(`Error: type: ${err.name}, message: ${err.message}`);
                    }
                    // retry
                    getDataRetryCount++;
                    if (getDataRetryCount < 5) {
                        document.getElementsByClassName("load-text")[0].innerText =
                            "retrying " + getDataRetryCount + "/5";
                        sleep(getDataRetryCount * 1000 + 2000);
                        getData();
                    }
                    if (getDataRetryCount == 5) {
                        document.getElementsByClassName("load-text")[0].innerText = "Please try again later.";
                    }
                }
            }

            //=============================================================
            // functions - run when called
            //=============================================================

            function useDataResults() {
                let container = document.getElementById("createleaderboarditems");
                // empty container
                container.innerHTML = "";
                //console.log(data);
                data.forEach((el, i) => {
                    let box = document.createElement("div");
                    box.id = "box" + i;
                    box.className = "team";
                    box.setAttribute("onclick", "showStats(this.id);return false;");

                    let name = document.createElement("span");
                    name.id = "name" + i;
                    name.className = "name";
                    name.innerHTML = el.players;

                    let scores = document.createElement("span");
                    scores.id = "scores" + i;
                    scores.className = "scores";

                    let position = document.createElement("span");
                    position.id = "position" + i;
                    position.className = "position";
                    position.innerHTML = i;

                    let birdgif = document.createElement("span");
                    birdgif.id = "birdgif" + i;
                    birdgif.className = "birdgif";

                    let birdgifnumber = document.createElement("span");
                    birdgifnumber.id = "birdgifnumber" + i;
                    birdgifnumber.className = "birdgifnumber";

                    let birdimg = document.createElement("img");
                    birdimg.id = "birdimg" + i;
                    birdimg.className = "birdimg";
                    birdimg.src = "bird.gif";

                    let birdcount = document.createElement("img");
                    birdcount.id = "birdcount" + i;
                    birdcount.className = "birdimg";

                    birdgif.appendChild(birdimg);
                    birdgifnumber.appendChild(birdcount);

                    box.appendChild(position);
                    box.appendChild(name);

                    box.appendChild(birdgif);
                    box.appendChild(birdgifnumber);

                    box.appendChild(scores);

                    container.appendChild(box);
                    // fade the initial view
                    container.style.opacity = 0.3;
                });

                var k = 0;

                // do proper display
                document.getElementById("createleaderboarditems").style.opacity = 1;

                data.forEach((el, i) => {
                    k++;
                    setTimeout(function () {
                        bodyUpdate(el.players, el.playerpoints, i);
                    }, k * 300);
                });
            }

            function bodyUpdate(nom, points, i) {
                let pos = i + 1;

                data.find((team) => team.players === nom);
                // now sort out positions for same scores
                let AllTeams = Array.from(document.querySelectorAll(".team"));
                let element = AllTeams[i];
                let elementPos = element.querySelector(".position");
                let elementScore = element.querySelector(".scores");
                let elementName = element.querySelector(".name");
                // cope with first position
                if (i < 1) {
                    let previousElement = AllTeams[i];
                    let previousElementPos = previousElement.querySelector(".position");
                    let previousElementScore = previousElement.querySelector(".scores");
                    elementPos.innerHTML = pos;
                } else {
                    let previousElement = AllTeams[i - 1];
                    let previousElementPos = previousElement.querySelector(".position");
                    let previousElementScore = previousElement.querySelector(".scores");
                    // if this score is the same as previous - same position
                    if (previousElementScore.innerHTML == points) {
                        elementPos.innerHTML = previousElementPos.innerHTML;
                    } else {
                        elementPos.innerHTML = pos;
                    }
                }
                // end of cope with first position
                //

                // sort out the birdies
                let elementBirdGif = element.querySelector(".birdgif");
                let elementBirdGifNumber = element.querySelector(".birdgifnumber");
                if (elementName.innerHTML == nom) {
                    elementScore.innerHTML = points;
                }
                var birdnum = data.find((team) => team.players === elementName.innerHTML).bird;
                if (birdnum > 0) {
                    document.getElementById("birdgif" + i).style.visibility = "visible";
                    document.getElementById("birdgifnumber" + i).className = "numbird";
                    document.getElementById("birdgifnumber" + i).innerText = birdnum;
                    document.getElementById("birdgifnumber" + i).style.visibility = "visible";
                }

                // fade in results
                elementPos.style.opacity = 0;
                elementName.style.opacity = 0;
                elementScore.style.opacity = 0;
                elementBirdGif.style.opacity = 0;
                elementBirdGifNumber.style.opacity = 0;

                elementPos.style.transition = "opacity 3s";
                elementName.style.transition = "opacity 3s";
                elementScore.style.transition = "opacity 3s";
                elementBirdGif.style.transition = "opacity 3s";
                elementBirdGifNumber.style.transition = "opacity 3s";

                elementPos.style.opacity = 1;
                elementName.style.opacity = 1;
                elementScore.style.opacity = 1;
                elementBirdGif.style.opacity = 1;
                elementBirdGifNumber.style.opacity = 1;

                element.classList.add("animate");
            }

            function showStats(id) {
                if (document.getElementById(id).hasChildNodes()) {
                    childtxt = document.getElementById(id).childNodes[1].innerText;
                    document.getElementById("statspanel").style.display = "flex";
                    //arrMyPoints = [eagles, birdies, pars, bogeys, worse];
                    // get correct players stats
                    let newEagle1 = data.find((searchplayer) => searchplayer.players === childtxt).eagle1;
                    let newBirdie1 = data.find((searchplayer) => searchplayer.players === childtxt).birdie1;
                    let newPar1 = data.find((searchplayer) => searchplayer.players === childtxt).par1;
                    let newBogey1 = data.find((searchplayer) => searchplayer.players === childtxt).bogey1;
                    let newWorse1 = data.find((searchplayer) => searchplayer.players === childtxt).worse1;

                    let newEagle2 = data.find((searchplayer) => searchplayer.players === childtxt).eagle2;
                    let newBirdie2 = data.find((searchplayer) => searchplayer.players === childtxt).birdie2;
                    let newPar2 = data.find((searchplayer) => searchplayer.players === childtxt).par2;
                    let newBogey2 = data.find((searchplayer) => searchplayer.players === childtxt).bogey2;
                    let newWorse2 = data.find((searchplayer) => searchplayer.players === childtxt).worse2;

                    let newEagle3 = data.find((searchplayer) => searchplayer.players === childtxt).eagle3;
                    let newBirdie3 = data.find((searchplayer) => searchplayer.players === childtxt).birdie3;
                    let newPar3 = data.find((searchplayer) => searchplayer.players === childtxt).par3;
                    let newBogey3 = data.find((searchplayer) => searchplayer.players === childtxt).bogey3;
                    let newWorse3 = data.find((searchplayer) => searchplayer.players === childtxt).worse3;

                    let newEagle4 = data.find((searchplayer) => searchplayer.players === childtxt).eagle4;
                    let newBirdie4 = data.find((searchplayer) => searchplayer.players === childtxt).birdie4;
                    let newPar4 = data.find((searchplayer) => searchplayer.players === childtxt).par4;
                    let newBogey4 = data.find((searchplayer) => searchplayer.players === childtxt).bogey4;
                    let newWorse4 = data.find((searchplayer) => searchplayer.players === childtxt).worse4;

                    let newEagle5 = data.find((searchplayer) => searchplayer.players === childtxt).eagle5;
                    let newBirdie5 = data.find((searchplayer) => searchplayer.players === childtxt).birdie5;
                    let newPar5 = data.find((searchplayer) => searchplayer.players === childtxt).par5;
                    let newBogey5 = data.find((searchplayer) => searchplayer.players === childtxt).bogey5;
                    let newWorse5 = data.find((searchplayer) => searchplayer.players === childtxt).worse5;

                    arrMyPoints1 = [newEagle1, newBirdie1, newPar1, newBogey1, newWorse1];
                    arrMyPoints2 = [newEagle2, newBirdie2, newPar2, newBogey2, newWorse2];
                    arrMyPoints3 = [newEagle3, newBirdie3, newPar3, newBogey3, newWorse3];
                    arrMyPoints4 = [newEagle4, newBirdie4, newPar4, newBogey4, newWorse4];
                    arrMyPoints5 = [newEagle5, newBirdie5, newPar5, newBogey5, newWorse5];

                    drawGraph(arrMyPoints1, arrMyPoints2, arrMyPoints3, arrMyPoints4, arrMyPoints5);
                }
            }

            function hideStatsPanel() {
                document.getElementById("statspanel").style.display = "none";
            }

            function drawGraph(arrMyPoints1, arrMyPoints2, arrMyPoints3, arrMyPoints4, arrMyPoints5) {
                var PlayerGraph;
                const xValues = ["eagles", "birdies", "pars", "bogeys", "worse"];
                var barColors = ["#8867e1", "#be59f5", "#65b0d6", "#40ffc6", "#c8df6f"];
                var borderColors = ["black"];
                var ctx = document.getElementById("myChart");
                try {
                    var PlayerGraph = Chart.getChart("myChart");
                    PlayerGraph.destroy();
                } catch (e) {
                    console.log("chart does not exist yet to destroy");
                }

                Chart.defaults.font.size = 16;
                Chart.defaults.color = "white";

                const footer = (tooltipItems) => {
                    let sum = 0;
                    tooltipItems.forEach(function (tooltipItem) {
                        sum += tooltipItem.parsed.y;
                    });
                    return "Sum: " + sum;
                };

                var PlayerGraph = new Chart(ctx, {
                    type: "bar",
                    data: {
                        labels: xValues,
                        datasets: [
                            {
                                backgroundColor: barColors[0],
                                data: arrMyPoints1,
                                borderColor: borderColors[0],
                                borderWidth: 2,
                                borderSkipped: false
                            },
                            {
                                backgroundColor: barColors[1],
                                data: arrMyPoints2,
                                borderColor: borderColors[0],
                                borderWidth: 2,
                                borderSkipped: false
                            },
                            {
                                backgroundColor: barColors[2],
                                data: arrMyPoints3,
                                borderColor: borderColors[0],
                                borderWidth: 2,
                                borderSkipped: false
                            },
                            {
                                backgroundColor: barColors[3],
                                data: arrMyPoints4,
                                borderColor: borderColors[0],
                                borderWidth: 2,
                                borderSkipped: false
                            },
                            {
                                backgroundColor: barColors[4],
                                data: arrMyPoints5,
                                borderColor: borderColors[0],
                                borderWidth: 2,
                                borderSkipped: false
                            }
                        ]
                    },

                    options: {
                        plugins: {
                            title: {
                                display: true,
                                text: "     " + childtxt + " - How you've played ..."
                            },
                            legend: {
                                display: false
                            },
                            tooltip: {
                                mode: "index",
                                intersect: false,
                                // 1. Reverse order of displayed tooltip items
                                itemSort: function (a, b) {
                                    return b.datasetIndex - a.datasetIndex;
                                },
                                callbacks: {
                                    // 2. Sum all active stacked values and return in a footer
                                    footer: function (tooltipItems) {
                                        let sum = 0;
                                        tooltipItems.forEach(function (item) {
                                            sum += item.parsed.y;
                                        });
                                        return "Total: " + sum.toLocaleString();
                                    }
                                }
                            }
                        },
                        responsive: true,
                        scales: {
                            x: {
                                stacked: true,
                                grid: {
                                    display: false
                                }
                            },
                            y: {
                                stacked: true,
                                grid: {
                                    display: true,
                                    color: "#3A3B3C"
                                }
                            }
                        }
                    }
                });
            }
        </script>
    </body>
</html>
