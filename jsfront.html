<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, user-scalable=no"
        />
        <title>js2026</title>
        <meta content="Bryan M" name="author" />
        <meta name="theme-color" content="indigo" />
        <meta name="robots" content="noindex" />
        <link href="originalgolf.svg" rel="icon" type="image/x-icon" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="originalgolf.svg.png"
        />
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
        <link
            href="https://fonts.googleapis.com/css?family=Kalam"
            rel="stylesheet"
        />
        <style>




                        body {
                                        height: 100vh;
                                        background-color: black;
                                        color: white;
                                        font-family: Helvetica, Arial, sans-serif;
                                        padding: 0;
                                        margin: 0;
                                        box-sizing: border-box;
                                        overflow: auto;
                                        background-image: url("arcot.png");
                                        background-position: center;
                                        background-repeat: no-repeat;
                                        background-size: cover;
                                        animation: fadein 1s;


            height: 100dvh;


                                    }

                                    /* menu */

                                    /* holds menu */
                                    .container {
                                        position: relative;
                                    }

                                    .icons {
                                        height: 20vh;
                                        background: transparent;
                                        color: white;
                                        display: flex;
                                        align-items: flex-end;
                                        justify-content: center;
                                        width: 100%;
                                        width: 150vw;
                                        margin: 20px auto;
                                        padding: 15px;
                                        max-width: 150vw;

                                    }

                                    .img1a {
                                        width: 25vw;
                                        text-align: center;
                                        font-size: 2.5vh;
                                        color: white;
                                    }

                                    /* end of menu */

                                    @keyframes slidein {
                                        0% {
                                            right: -100%;
                                        }
                                        100% {
                                            right: 0;
                                            display: block;
                                        }
                                    }

                                    .spacer {
                                        height: 2vh;
                                    }

                                    .txt1,
                                    .txt2 {
                                        font-size: 5vh;
                                        width: 100%;
                                        height: 40vh;
                                        display: flex;
                                        align-items: center;
                                        justify-content: center;
                                        color: white;
                                        font-family: "Kalam";

                                        font-weight: bold;

                                        height: 13vh;
                                        font-weight: 900;
                                        text-shadow:
                                            -2px -2px 0 gray,
                                            2px -2px 0 gray,
                                            -2px 2px 0 gray,
                                            2px 2px 0 gray,
                                            -3px 0px 0 gray,
                                            3px 0px 0 gray,
                                            0px -3px 0 gray,
                                            0px 3px 0 gray;
                                    }

                                    .txt1 {
                                        position: absolute;
                                        top: 3vh;
                                        left: 0;
                                    }
                                    .txt2 {
                                        position: absolute;
                                        top: 10vh;
                                        left: 0;
                                    }

                                    .subtxt1,
                                    .subtxt2 {
                                        font-size: 5vh;
                                        width: 100%;
                                        height: 40vh;
                                        display: flex;
                                        align-items: center;
                                        justify-content: center;
                                        color: white;
                                        font-family: "Kalam";
                                        font-weight: bold;
                                        height: 13vh;
                                        font-weight: 900;
                                        text-shadow:
                                            -2px -2px 0 gray,
                                            2px -2px 0 gray,
                                            -2px 2px 0 gray,
                                            2px 2px 0 gray,
                                            -3px 0px 0 gray,
                                            3px 0px 0 gray,
                                            0px -3px 0 gray,
                                            0px 3px 0 gray;
                                    }

                                    .subtxt1 {
                                        position: absolute;
                                        top: 18vh;
                                        left: 0;
                                    }

                                    .subtxt2 {
                                        position: absolute;
                                        top: 25vh;
                                        left: 0;
                                    }

                                    #warning {
                                        display: none;
                                        position: absolute;
                                        top: 0;
                                        left: 0;
                                        background: indigo;
                                        width: 100vw;
                                        height: 100vh;
                                        z-index: 999;
                                        text-align: center;
                                        color: white;
                                        padding-top: 40vh;
                                        font-size: 5vw;
                                        font-family: "Kalam";
                                    }

                                    #round {
                                        position: absolute;
                                        top: 40vh;
                                        right: 30vw;
                                        width: 40vw;
                                        height: 40vw;

                                        border-radius: 50%;
                                    }

                                    #js {
                                        max-height: 100%;
                                        max-width: 100%;
                                        border-radius: 50%;
                                        border: 3px solid white;
                                    }

                                    #round.half {
                                        background: white;
                                        box-shadow: 10px 10px 10px black;
                                        transform: scale(2.2) translateX(0.5%);
                                    }

                                    /* back arrow */
                                    .imgrightcontainer {
                                        width: 20vw;
                                        height: 20vw;
                                        position: fixed;
                                        bottom: 15vh;
                                        right: 10vw;
                                        display: none; //flex;
                                        align-items: center;
                                        justify-content: center;
                                        animation: fadein 5s;
                                        background: transparent;
                                        border-radius: 50%;
                                        border: 5px solid rgba(255, 255, 255, 0.2);
                                        box-shadow: 10px 10px 25px black;
                                        background-clip: padding-box;
                                        z-index: 9;
                                        opacity: 0;
                                        animation: bounce 2.5s 2;
                                    }

                                    @keyframes fadein {
                                        0% {
                                            opacity: 0;
                                        }
                                        100% {
                                            opacity: 1;
                                        }
                                    }

                                    @keyframes bounce {
                                      0%, 20%, 50%, 80% {
                                        transform: translateX(0);
                                        opacity: 1;
                                      }
                                      40% {
                                        transform: translateX(-50px);
                                        opacity: 1;
                                      }
                                      60% {
                                        transform: translateX(-15px);
                                        opacity: 1;
                                      }
                                      100% {
                                          transform: translateX(0);
                                          opacity: 0;
                                      }
                                    }

                                    .scroll {
                                             height: 25vh;
                                             background: transparent;
                                             color: white;
                                             display: flex;
                                             position: fixed;
                                             bottom: 0;
                                             width: 100%;
                                             overflow-y: hidden;
                                             overflow-x: scroll;
                                             white-space: nowrap;
                                             max-width: 100%;
                                             overflow-x: auto;
                                             overflow-y: hidden;
                                             white-space: nowrap;
                                             }
        </style>
    </head>

    <body>
        <div id="warning">Not available in landscape orientation</div>

        <div class="container">
            <!-- main menu and pages go in here -->
            <div id="round">
                <img
                    id="js"
                    src="jspicture.png"
                    alt=""
                    onclick="enlarge(this.id)"
                />
            </div>
            <div class="txt1">5th Jim Stamas</div>
            <div class="txt2">Memorial Cup</div>
            <div class="subtxt1">Arcot Hall golf club</div>
            <div class="subtxt2">28th June 2026</div>
            <div class="scroll" id="scroll">
                <div class="icons" id="icons">
                    <div class="img1a" onclick="showAboutJim()">
                        <img
                            id="img6"
                            style="border: 0; height: 8vh; width: 8vh"
                            src="avatar.png"
                            alt=""
                        />
                        <br />about <br />Jim

                        <div class="spacer"></div>
                    </div>
                    <div class="img1a" onclick="showToday()">
                        <img
                            id="img6"
                            style="border: 0; height: 8vh; width: 8vh"
                            src="agenda.png"
                            alt=""
                        />
                        <br />day <br />info

                        <div class="spacer"></div>
                    </div>
                    <div class="img1a" onclick="showTeeTimes()">
                        <img
                            id="img1"
                            style="border: 0; height: 8vh; width: 8vh"
                            src="teetimes.png"
                            alt=""
                        />
                        <br />tee <br />times

                        <div class="spacer"></div>
                    </div>
                    <div class="img1a" onclick="showTeamResults()">
                        <img
                            id="img3"
                            style="border: 0; height: 8vh; width: 8vh"
                            src="teamresults.png"
                            alt=""
                        />
                        <br />team <br />results

                        <div class="spacer"></div>
                    </div>
                    <div class="img1a" onclick="showIndividualGross()">
                        <img
                            id="img4"
                            style="border: 0; height: 8vh; width: 8vh"
                            src="gross.png"
                            alt=""
                        />
                        <br />individual <br />gross

                        <div class="spacer"></div>
                    </div>
                    <div class="img1a" onclick="showIndividualPoints()">
                        <img
                            id="img5"
                            style="border: 0; height: 8vh; width: 8vh"
                            src="points.png"
                            alt=""
                        />
                        <br />individual <br />points

                        <div class="spacer"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="imgrightcontainer" class="imgrightcontainer">
            <img
                id="tempright"
                style="border: 0; height: 15vw; width: 15vw"
                src="swipe.png"
                alt=">"
            />
        </div>

        <script>
            // scroll menu slightly on each first load
            if (history.length < 3) {
                setTimeout(function () {
                    document.getElementById("scroll").scrollBy({
                        bottom: 0,
                        left: 100,
                        behavior: "smooth",
                    });
                }, 1500);

                setTimeout(function () {
                    document.getElementById("scroll").scrollBy({
                        bottom: 0,
                        left: -100,
                        behavior: "smooth",
                    });
                }, 2000);
            }

            // detect using a phone or not
            if (
                /Android|webOS|iPhone|iPad|iPod|BlackBerryAndroid|webOS/i.test(
                    navigator.userAgent,
                ) ||
                /iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(
                    navigator.userAgent,
                )
            ) {
                console.log("phone or tablet");
                //alert("phone or tablet");
            } else {
                console.log("This is not a phone or tablet");
                //alert(
                //    "Info: Device set to use the Desktop site\nSo assuming this is not a phone or tablet\nThis app is only created for use by a\nphone or small tablet in portrait orientation",
                //);
            }

            // Detect whether device supports orientationchange event, otherwise fall back to
            // the resize event.
            var supportsOrientationChange = "onorientationchange" in window,
                orientationEvent = supportsOrientationChange
                    ? "orientationchange"
                    : "resize";

            window.addEventListener(
                orientationEvent,
                function () {
                    if (window.orientation == 0) {
                        document.getElementById("warning").style.display =
                            "none";
                    } else if (
                        window.orientation == 90 ||
                        window.orientation == -90
                    ) {
                        document.getElementById("warning").style.display =
                            "block";
                    }
                },
                false,
            );

            // set first run

            //setTimeout(
            //    function () {
            //        if (document.getElementById("imgrightcontainer").style.display !== "none") {
            //            document.getElementById("imgrightcontainer").style.display = "none";
            //        }
            //    },
            //    5000,
            //);

            function showAboutJim() {
                location.href = "jsjim.html";
            }

            function showToday() {
                location.href = "jstoday.html";
            }

            function showTeeTimes() {
                location.href = "jsviewtees.html";
            }

            function showTeamResults() {
                location.href = "jsteam.html";
            }

            function showIndividualGross() {
                location.href = "jsgross.html";
            }

            function showIndividualPoints() {
                location.href = "jspoints.html";
            }

            function enlarge() {
                document.getElementById("round").classList.toggle("half");
            }
        </script>
    </body>
</html>
